postgres:
  build:
    context: ./docker
    dockerfile: Dockerfile.pg-analytics-stack
  image: athena-mcp-pg:v5-ultra-perf
  container_name: athena-mcp-pg
  ports:
    - "46432:5432" # Direct PG (admin, migrations, pg_duckdb). Use 46433 for apps
  environment:
    POSTGRES_DB: athena-mcp
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    PGDATA: /home/postgres/pgdata
    POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    # Extension configuration
    POSTGRES_SHARED_PRELOAD_LIBRARIES: "timescaledb,age,pg_duckdb,pg_cron,pg_net,pg_documentdb_core,pg_documentdb"
    # DuckDB settings
    DUCKDB_ALLOW_COMMUNITY_EXTENSIONS: "true"
    # ============================================
    # PostgreSQL Ultra High-Performance Tuning (65GB container)
    # ============================================
    # Memory Configuration (scaled for 65GB)
    PG_SHARED_BUFFERS: "16GB" # 25% of container RAM
    PG_EFFECTIVE_CACHE_SIZE: "48GB" # 75% of container RAM
    PG_WORK_MEM: "512MB" # Per-operation sort/hash memory (doubled)
    PG_MAINTENANCE_WORK_MEM: "4GB" # VACUUM, CREATE INDEX, ALTER TABLE
    PG_WAL_BUFFERS: "128MB" # WAL write buffer (doubled for heavy writes)
    PG_HUGE_PAGES: "try" # Use huge pages if available
    # Parallelism (scaled for more cores)
    PG_MAX_WORKER_PROCESSES: "24" # Total background workers
    PG_MAX_PARALLEL_WORKERS: "16" # Parallel query workers
    PG_MAX_PARALLEL_WORKERS_PER_GATHER: "8" # Per-query parallelism
    PG_MAX_PARALLEL_MAINTENANCE_WORKERS: "6" # Parallel index builds
    # Connections
    PG_MAX_CONNECTIONS: "300" # Connection pool ceiling (increased)
    # ============================================
    # Write Performance Optimization (NEW)
    # ============================================
    # Commit batching (reduces fsync calls dramatically)
    PG_COMMIT_DELAY: "10000" # 10ms delay to batch commits
    PG_COMMIT_SIBLINGS: "5" # Only delay if 5+ transactions active
    # Asynchronous commit (3-5x write speedup, risk: up to 600ms data loss on crash)
    PG_SYNCHRONOUS_COMMIT: "off" # Safe for analytics workloads
    # ============================================
    # Checkpoints & WAL (scaled for 65GB)
    # ============================================
    PG_CHECKPOINT_COMPLETION_TARGET: "0.9" # Spread checkpoint writes
    PG_WAL_COMPRESSION: "zstd" # Compress WAL (PG17+)
    PG_MIN_WAL_SIZE: "2GB" # Doubled
    PG_MAX_WAL_SIZE: "8GB" # Doubled for heavy writes
    PG_CHECKPOINT_TIMEOUT: "15min" # Longer checkpoint interval
    # Query Planner
    PG_RANDOM_PAGE_COST: "1.1" # SSD-optimized (default 4.0)
    PG_EFFECTIVE_IO_CONCURRENCY: "200" # SSD concurrent I/O
    PG_DEFAULT_STATISTICS_TARGET: "200" # Better query plans
    # JIT Compilation
    PG_JIT: "on"
    PG_JIT_ABOVE_COST: "100000"
    # ============================================
    # Extension-Specific Tuning (scaled for 65GB)
    # ============================================
    # DuckDB (embedded OLAP) - gets more memory
    DUCKDB_MEMORY_LIMIT: "24GB" # DuckDB can use up to 24GB
    DUCKDB_THREADS: "12" # DuckDB parallelism (increased)
    # TimescaleDB
    TIMESCALEDB_MAX_BACKGROUND_WORKERS: "12" # Compression, continuous aggs (increased)
    TIMESCALEDB_TELEMETRY: "off"
    # AGE (Graph)
    AGE_ENABLE_CYPHER: "true"
  # PostgreSQL command with runtime config (65GB optimized)
  command: >
    postgres
    -c shared_buffers=16GB
    -c effective_cache_size=48GB
    -c work_mem=512MB
    -c maintenance_work_mem=4GB
    -c wal_buffers=128MB
    -c max_worker_processes=24
    -c max_parallel_workers=16
    -c max_parallel_workers_per_gather=8
    -c max_parallel_maintenance_workers=6
    -c max_connections=300
    -c checkpoint_completion_target=0.9
    -c checkpoint_timeout=15min
    -c wal_compression=zstd
    -c min_wal_size=2GB
    -c max_wal_size=8GB
    -c random_page_cost=1.1
    -c effective_io_concurrency=200
    -c default_statistics_target=200
    -c jit=on
    -c jit_above_cost=100000
    -c huge_pages=try
    -c shared_preload_libraries='timescaledb,age,pg_duckdb,pg_cron,pg_net,pg_documentdb_core,pg_documentdb'
    -c commit_delay=10000
    -c commit_siblings=5
    -c synchronous_commit=off
    -c timescaledb.max_background_workers=12
    -c timescaledb.telemetry_level=off
    -c duckdb.memory_limit='24GB'
    -c duckdb.threads=12
    -c log_min_duration_statement=1000
    -c log_checkpoints=on
    -c log_lock_waits=on
    -c track_io_timing=on
    -c track_functions=all
    -c cron.database_name=athena-mcp
  volumes:
    - pg_data:/home/postgres/pgdata
    - ./db/pg/cache:/docker-entrypoint-initdb.d:ro
    - /mnt/camelot/duckdb:/parquet:ro
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres -d athena-mcp"]
    interval: 5s
    timeout: 5s
    retries: 5
    start_period: 60s # Increased for larger shared_buffers init
  shm_size: "20gb" # Critical for shared_buffers (16GB) + DuckDB + AGE
  restart: unless-stopped
  # Linux kernel tuning (requires privileged or host sysctl)
  sysctls:
    - net.core.somaxconn=65535
    - net.ipv4.tcp_max_syn_backlog=65535
  ulimits:
    memlock:
      soft: -1
      hard: -1
    nofile:
      soft: 65536
      hard: 65536
  deploy:
    resources:
      limits:
        memory: 65G # Ultra high-performance analytics
      reservations:
        memory: 32G

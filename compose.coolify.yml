services:
  postgres:
    image: ghcr.io/wolfschanze-berlin/fetter-sack-db:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      DUCKDB_ALLOW_COMMUNITY_EXTENSIONS: "true"
    command: >
      postgres
      -c shared_buffers=16GB
      -c effective_cache_size=48GB
      -c work_mem=512MB
      -c maintenance_work_mem=4GB
      -c wal_buffers=128MB
      -c max_worker_processes=24
      -c max_parallel_workers=16
      -c max_parallel_workers_per_gather=8
      -c max_parallel_maintenance_workers=6
      -c max_connections=300
      -c checkpoint_completion_target=0.9
      -c checkpoint_timeout=15min
      -c wal_compression=zstd
      -c min_wal_size=2GB
      -c max_wal_size=8GB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c default_statistics_target=200
      -c jit=on
      -c jit_above_cost=100000
      -c huge_pages=try
      -c shared_preload_libraries='pg_partman_bgw,pg_stat_statements,age,pg_duckdb,pg_cron,pg_net'
      -c commit_delay=10000
      -c commit_siblings=5
      -c synchronous_commit=off
      -c pg_partman_bgw.interval=3600
      -c pg_partman_bgw.dbname='postgres'
      -c duckdb.memory_limit='24GB'
      -c duckdb.threads=12
      -c log_min_duration_statement=1000
      -c log_checkpoints=on
      -c log_lock_waits=on
      -c track_io_timing=on
      -c track_functions=all
      -c cron.database_name=postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s
    shm_size: "20gb"
    restart: unless-stopped

  migrations:
    image: ghcr.io/wolfschanze-berlin/fetter-sack-db:latest
    entrypoint: ["bash", "-c"]
    command:
      - |
        until pg_isready -h postgres -U postgres -d postgres; do sleep 1; done
        echo "Running migrations..."
        psql -h postgres -U postgres -d postgres <<'EOSQL'
        -- 000-postgrest-roles.sql (idempotent)
        DO $$$$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'authenticator') THEN
                CREATE ROLE authenticator LOGIN NOINHERIT PASSWORD 'authenticator';
                RAISE NOTICE 'Created role: authenticator';
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'anon') THEN
                CREATE ROLE anon NOLOGIN;
                RAISE NOTICE 'Created role: anon';
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'webuser') THEN
                CREATE ROLE webuser NOLOGIN;
                RAISE NOTICE 'Created role: webuser';
            END IF;
        END $$$$;
        GRANT anon TO authenticator;
        GRANT webuser TO authenticator;
        CREATE SCHEMA IF NOT EXISTS api;
        CREATE SCHEMA IF NOT EXISTS app;
        GRANT USAGE ON SCHEMA api TO anon, webuser;
        GRANT USAGE ON SCHEMA app TO anon, webuser;
        GRANT USAGE ON SCHEMA public TO anon, webuser;
        ALTER DEFAULT PRIVILEGES IN SCHEMA api GRANT SELECT ON TABLES TO anon;
        ALTER DEFAULT PRIVILEGES IN SCHEMA api GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO webuser;
        ALTER DEFAULT PRIVILEGES IN SCHEMA api GRANT EXECUTE ON FUNCTIONS TO anon, webuser;
        ALTER DEFAULT PRIVILEGES IN SCHEMA api GRANT USAGE ON SEQUENCES TO webuser;
        ALTER DEFAULT PRIVILEGES IN SCHEMA app GRANT SELECT ON TABLES TO anon;
        ALTER DEFAULT PRIVILEGES IN SCHEMA app GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO webuser;
        ALTER DEFAULT PRIVILEGES IN SCHEMA app GRANT USAGE ON SEQUENCES TO webuser;

        -- 001-api-health.sql (idempotent)
        CREATE OR REPLACE FUNCTION api.health()
        RETURNS json LANGUAGE sql STABLE SECURITY DEFINER AS $$$$
            SELECT json_build_object(
                'status', 'ok',
                'version', current_setting('server_version'),
                'timestamp', now(),
                'database', current_database()
            );
        $$$$;
        GRANT EXECUTE ON FUNCTION api.health() TO anon, webuser;
        SELECT pg_notify('pgrst', 'reload schema');
        EOSQL
        echo "Migrations complete"
        touch /tmp/migrations_done
        sleep infinity
    environment:
      PGPASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/migrations_done"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgrest:
    image: postgrest/postgrest:v12.2.3
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: "postgres://authenticator:authenticator@postgres:5432/postgres"
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_EXTRA_SEARCH_PATH: "public,app,analytics,embeddings,partman"
      PGRST_DB_POOL: "20"
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: "10"
      PGRST_DB_PREPARED_STATEMENTS: "false"
      PGRST_JWT_SECRET: "your-256-bit-secret-replace-me-in-production-min-32-chars"
      PGRST_JWT_SECRET_IS_BASE64: "false"
      PGRST_DB_MAX_ROWS: "1000"
      PGRST_DB_AGGREGATES_ENABLED: "true"
      PGRST_SERVER_CORS_ALLOWED_ORIGINS: ""
      PGRST_LOG_LEVEL: warn
      PGRST_DB_CHANNEL_ENABLED: "true"
      PGRST_DB_CHANNEL: pgrst
      PGRST_ADMIN_SERVER_PORT: "3001"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:

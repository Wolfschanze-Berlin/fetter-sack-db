;; PgBouncer High-Performance Configuration
;; Docs: https://www.pgbouncer.org/config.html
;;
;; Architecture: clients -> pgbouncer (pool) -> postgresql
;; Mode: transaction (best throughput, releases backend after each txn)

[databases]
;; Wildcard: ANY database name routes to same-name DB on PostgreSQL
;; This means all schemas, all databases are accessible — zero config per DB
* = host=fetter-sack-db port=5432

[pgbouncer]

;; ─── Listening ──────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 5432
unix_socket_dir =

;; ─── Authentication ─────────────────────────────────────────────────────
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

;; ─── Pool Mode ──────────────────────────────────────────────────────────
;; transaction: backend released after each transaction (best for web apps)
;; Prepared statements do NOT work in transaction mode — PostgREST must
;; set PGRST_DB_PREPARED_STATEMENTS=false
pool_mode = transaction

;; Reset backend state after each transaction returns to pool
;; DISCARD ALL clears temp tables, prepared statements, session variables
server_reset_query = DISCARD ALL
server_reset_query_always = 0

;; ─── Pool Sizing (tuned for 65GB PostgreSQL with max_connections=300) ───
;; Connections per user/database pair
default_pool_size = 40
;; Pre-warm connections on startup (reduce first-request latency)
min_pool_size = 10
;; Burst headroom (activated after reserve_pool_timeout seconds)
reserve_pool_size = 10
reserve_pool_timeout = 3

;; ─── Connection Limits ──────────────────────────────────────────────────
;; Max client connections PgBouncer accepts (10:1 multiplex ratio)
max_client_conn = 2000
;; Max backend connections to PostgreSQL (across all pools)
max_db_connections = 150
;; Max connections per user (prevents one user from starving others)
max_user_connections = 100

;; ─── Timeouts ───────────────────────────────────────────────────────────
;; Close idle backend connections after 5 minutes
server_idle_timeout = 300
;; Recycle backend connections after 1 hour (prevents stale connections)
server_lifetime = 3600
;; Time to establish connection to PostgreSQL
server_connect_timeout = 5
;; Retry failed connections after 1 second
server_login_retry = 1
;; Client idle timeout (0 = disabled, let apps manage their own)
client_idle_timeout = 0
;; Client login timeout
client_login_timeout = 30
;; Query timeout (0 = disabled, PostgreSQL's statement_timeout handles this)
query_timeout = 0
;; How long a client waits for a backend connection before error
query_wait_timeout = 60

;; ─── TCP Keepalive (detect dead connections fast) ───────────────────────
tcp_keepalive = 1
tcp_keepidle = 30
tcp_keepintvl = 10
tcp_keepcnt = 3
;; TCP defer accept (Linux: don't wake until data arrives)
tcp_defer_accept = 1

;; ─── Performance ────────────────────────────────────────────────────────
;; Use libevent's fastest backend
;; pkt_buf: packet buffer size (4096 is good for most workloads)
pkt_buf = 4096
;; listen_backlog: pending connection queue depth
listen_backlog = 2048
;; sbuf_loopcnt: how many packets to process per event loop iteration
;; Higher = more throughput, higher = more latency variance
sbuf_loopcnt = 5

;; ─── Logging ────────────────────────────────────────────────────────────
;; Keep logging minimal for performance; enable for debugging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
;; Verbose stats in log every 60s (useful for monitoring)
verbose = 0

;; ─── Admin ──────────────────────────────────────────────────────────────
admin_users = postgres
stats_users = postgres

;; ─── Transaction Mode Compatibility ─────────────────────────────────────
;; PostgREST and many ORMs send these on connect; ignore in transaction mode
ignore_startup_parameters = extra_float_digits,search_path,options

;; ─── Application Name Tracking ──────────────────────────────────────────
;; Append client host to application_name for pg_stat_activity debugging
application_name_add_host = 1
